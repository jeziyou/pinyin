<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🀄 汉字乐园 | Chinese Character Wonderland</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet" />
</head>
<body>
  <!-- 加载页 -->
  <div id="loader" class="loader">
    <div class="loader-inner">
      <div class="loader-char">汉</div>
      <div class="loader-text">汉字乐园加载中...</div>
      <div class="loader-bar"><div></div></div>
    </div>
  </div>

  <!-- 顶部标题栏 -->
  <header class="topbar">
    <div class="topbar-inner">
      <div class="logo">
        <span class="logo-icon">🀄</span>
        <div class="logo-text">
          <div class="logo-title">汉字乐园</div>
          <div class="logo-sub">Chinese Character Wonderland</div>
        </div>
      </div>
      <div class="topbar-right">
        <div class="lang-switch">
          <button id="btnLangCN" class="lang-btn active">中文</button>
          <button id="btnLangEN" class="lang-btn">English</button>
        </div>
        <div class="stat-chip" title="已学汉字">
          <span>📚</span><span id="chipLearned">0</span>/<span id="chipTotal">0</span>
        </div>
        <div class="stat-chip star" title="星星">
          <span>⭐</span><span id="chipStars">0</span>
        </div>
      </div>
    </div>
  </header>

  <!-- 导航 -->
  <nav class="nav">
    <div class="nav-inner">
      <button class="nav-btn active" data-page="home">🏠 <span class="nav-label">首页</span></button>
      <button class="nav-btn" data-page="learn">📖 <span class="nav-label">学习汉字</span></button>
      <button class="nav-btn" data-page="stories">📚 <span class="nav-label">故事时间</span></button>
      <button class="nav-btn" data-page="quiz">🎮 <span class="nav-label">趣味测验</span></button>
      <button class="nav-btn" data-page="progress">⭐ <span class="nav-label">学习进度</span></button>
    </div>
  </nav>

  <!-- 主区 -->
  <main id="app" class="app"></main>

  <!-- 详情弹窗 -->
  <div id="modal" class="modal hidden">
    <div class="modal-mask"></div>
    <div class="modal-panel" id="modalPanel">
      <button class="modal-close" id="modalClose">×</button>
      <div id="modalBody"></div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast hidden"></div>

  <!-- 内联数据 -->
  <script>window.DATA_JSON = null;</script>
  
  <!-- 脚本 -->
  <script src="app.js"></script>
</body>
</html>
