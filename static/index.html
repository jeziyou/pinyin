<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>汉字乐园 · Chinese Character Wonderland</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* 小的补充样式，避免在外部 CSS 里重复 */
    .app-main { max-width: 1280px; margin: 0 auto; padding: 24px 30px 80px; }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner" style="max-width:1280px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:18px;flex-wrap:wrap">
      <div style="display:flex;align-items:center;gap:14px">
        <div class="logo-icon">🏯</div>
        <div>
          <div id="logo-title" class="logo-title" style="font-size:28px;font-weight:900;color:white;text-shadow:0 2px 6px rgba(0,0,0,0.2);letter-spacing:2px;line-height:1.1">汉字乐园</div>
          <div id="logo-sub" style="font-size:13px;color:rgba(255,255,255,0.95);font-weight:600;letter-spacing:1px;margin-top:4px">学汉字 · 听故事 · 快乐成长</div>
        </div>
      </div>
      <div id="topbar-right"></div>
    </div>
  </header>

  <nav id="nav-bar" style="max-width:1280px;margin:0 auto;padding:20px 30px 4px;display:flex;gap:12px;flex-wrap:wrap;justify-content:center"></nav>

  <main class="app-main">
    <h1 id="page-title" style="font-size:26px;font-weight:800;color:#2C3E50;margin:10px 0 14px"></h1>
    <p id="page-desc" style="color:#5B5196;font-size:15px;margin-bottom:22px;line-height:1.8"></p>
    <div id="filter-bar" style="margin-bottom:18px"></div>
    <div id="page-main"></div>
  </main>

  <script src="app.js"></script>
</body>
</html>
